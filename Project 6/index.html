<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Knowledge Check</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-background">
        <div class="quiz-container">
            <header class="quiz-header">
                <div class="icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                </div>
                <h1>Weekly Knowledge Check</h1>
                <p class="subtitle">Classroom Quiz • 5 Questions</p>
            </header>

            <form id="quiz-form">
                <!-- Question 1 -->
                <div class="question-card" data-question="1">
                    <h3 class="question-text">1. What is the capital of France?</h3>
                    <div class="options-grid">
                        <label class="option-label">
                            <input type="radio" name="q1" value="Berlin">
                            <span class="option-text">Berlin</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q1" value="Madrid">
                            <span class="option-text">Madrid</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q1" value="Paris">
                            <span class="option-text">Paris</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q1" value="Rome">
                            <span class="option-text">Rome</span>
                        </label>
                    </div>
                </div>

                <!-- Question 2 -->
                <div class="question-card" data-question="2">
                    <h3 class="question-text">2. Which planet is known as the Red Planet?</h3>
                    <div class="options-grid">
                        <label class="option-label">
                            <input type="radio" name="q2" value="Earth">
                            <span class="option-text">Earth</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q2" value="Mars">
                            <span class="option-text">Mars</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q2" value="Jupiter">
                            <span class="option-text">Jupiter</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q2" value="Venus">
                            <span class="option-text">Venus</span>
                        </label>
                    </div>
                </div>

                <!-- Question 3 -->
                <div class="question-card" data-question="3">
                    <h3 class="question-text">3. What is 5 + 7?</h3>
                    <div class="options-grid">
                        <label class="option-label">
                            <input type="radio" name="q3" value="10">
                            <span class="option-text">10</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q3" value="11">
                            <span class="option-text">11</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q3" value="12">
                            <span class="option-text">12</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q3" value="13">
                            <span class="option-text">13</span>
                        </label>
                    </div>
                </div>

                <!-- Question 4 -->
                <div class="question-card" data-question="4">
                    <h3 class="question-text">4. Who painted the Mona Lisa?</h3>
                    <div class="options-grid">
                        <label class="option-label">
                            <input type="radio" name="q4" value="Vincent van Gogh">
                            <span class="option-text">Vincent van Gogh</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q4" value="Pablo Picasso">
                            <span class="option-text">Pablo Picasso</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q4" value="Leonardo da Vinci">
                            <span class="option-text">Leonardo da Vinci</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q4" value="Claude Monet">
                            <span class="option-text">Claude Monet</span>
                        </label>
                    </div>
                </div>

                <!-- Question 5 -->
                <div class="question-card" data-question="5">
                    <h3 class="question-text">5. What is the chemical symbol for water?</h3>
                    <div class="options-grid">
                        <label class="option-label">
                            <input type="radio" name="q5" value="H2O">
                            <span class="option-text">H2O</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q5" value="CO2">
                            <span class="option-text">CO2</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q5" value="O2">
                            <span class="option-text">O2</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q5" value="NaCl">
                            <span class="option-text">NaCl</span>
                        </label>
                    </div>
                </div>

                <div class="submit-section">
                    <button type="submit" id="submit-btn" class="btn-primary">Submit Answers</button>
                    <div id="result-message" class="result-box hidden"></div>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
